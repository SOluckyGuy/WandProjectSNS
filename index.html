<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WandProjectSN | Dashboard</title>
    <style>
        body{font-family:'Segoe UI',sans-serif;margin:0;background:#0e0e0e;color:#fff;display:flex;height:100vh;overflow:hidden}
        .sidebar{width:85px;background:#121212;border-right:1px solid #222;display:flex;flex-direction:column;align-items:center;padding-top:15px;gap:15px}
        .logo{font-weight:900;font-size:14px;color:#00ff96;text-align:center;line-height:1;margin-bottom:10px;text-transform:uppercase;letter-spacing:1.5px;text-shadow:0 0 10px rgba(0,255,150,.4);border-bottom:1px solid #222;padding-bottom:12px;width:100%}
        .logo span{display:block;color:#0072ff;font-size:10px;margin-top:2px;text-shadow:0 0 10px rgba(0,114,255,.4)}
        .logo .sn-bottom{display:block;color:#fc0;font-size:9px;margin-top:4px;letter-spacing:3px;font-weight:700;text-shadow:0 0 8px rgba(255,204,0,.3)}
        .tab-btn{width:50px;height:50px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#888;cursor:pointer;font-weight:700;transition:.3s;display:flex;justify-content:center;align-items:center;font-size:10px;text-align:center;text-transform:uppercase}
        .tab-btn:hover{border-color:#0072ff;color:#fff}
        .tab-btn.active{background:#0072ff;color:#fff;border-color:#0072ff;box-shadow:0 0 15px rgba(0,114,255,.4)}
        .main-content{flex-grow:1;display:flex;justify-content:center;align-items:center}
        .container{text-align:center;background:#161616;padding:40px;border-radius:20px;border:1px solid #222;box-shadow:0 15px 40px rgba(0,0,0,.6);width:320px;display:none}
        .container.active{display:block;animation:fadeIn .4s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        h1{color:#00ff96;font-size:20px;margin-bottom:25px;text-transform:uppercase}
        .info-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #222;margin-bottom:15px}
        .label{color:#888;font-size:14px}.val{font-weight:700}
        .discord-btn, .action-btn{background:#5865f2;color:#fff;border:none;padding:12px 20px;border-radius:8px;font-weight:700;cursor:pointer;width:100%;transition:.3s;display:flex;justify-content:center;align-items:center;gap:10px;text-transform:uppercase;font-size:14px}
        .action-btn{background:#0072ff; margin-top: 10px;}
        .special-btn{background:#fc0 !important; color:#000 !important; margin-top: 20px;}
        .discord-btn:hover, .action-btn:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(0,114,255,.4)}
        .desc-text{color:#ccc;font-size:14px;line-height:1.6;margin-bottom:20px}
        input{width:100%;box-sizing:border-box;padding:12px;margin-bottom:12px;background:#0c0c0c;border:1px solid #333;border-radius:8px;color:#fff;outline:none}
        input:focus{border-color:#0072ff}
        .msg{font-size:11px;margin-top:10px;display:none}
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">WAND<span>PROJECT</span><div class="sn-bottom">SN</div></div>
        <button class="tab-btn active" id="b-main">MAIN</button>
        <button class="tab-btn" id="b-info">INFO</button>
        <div style="height:1px; width:30px; background:#222; margin: 5px 0;"></div>
        <button class="tab-btn" id="b-auth">AUTH</button>
        <button class="tab-btn" id="b-special" style="display:none; border-color:#fc0; color:#fc0">SPECIAL</button>
        <button class="tab-btn" id="b-user" style="display:none">USER</button>
    </div>

    <div class="main-content">
        <div id="t-main" class="container active">
            <h1>Status Monitor</h1>
            <div class="info-row"><span class="label">Server</span><span id="st-val" class="val">CHECKING</span></div>
            <div class="info-row"><span class="label">Version</span><span class="val" style="color:#0072ff">2.4.5</span></div>
        </div>

        <div id="t-info" class="container">
            <h1>Information</h1>
            <p class="desc-text">WandProjectSN — authentic software solution. Stay updated.</p>
            <button class="discord-btn" id="b-dsc">JOIN DISCORD</button>
        </div>

        <div id="t-special" class="container">
            <h1 style="color:#fc0">Premium Access</h1>
            <p class="desc-text">Thanks for the buying!</p>
            <button class="action-btn special-btn" onclick="downloadAndExit()">Download Cheat</button>
        </div>

        <div id="t-auth" class="container">
            <h1>Authorization</h1>
            <input type="email" id="l-email" placeholder="Email">
            <input type="password" id="l-pass" placeholder="Password">
            <button class="action-btn" onclick="login()">Sign In</button>
            <p id="l-msg" class="msg" style="color:#ff4444"></p>
            <button style="background:none; border:none; color:#888; font-size:10px; cursor:pointer; margin-top:15px; text-decoration:underline" onclick="switchAuth('t-reg')">Create Account</button>
        </div>

        <div id="t-reg" class="container">
            <h1>Registration</h1>
            <input type="email" id="r-email" placeholder="Email">
            <input type="password" id="r-pass" placeholder="Password">
            <input type="password" id="r-conf" placeholder="Confirm Password">
            <button class="action-btn" style="background:#00ff96; color:#000" onclick="register()">Create Account</button>
            <p id="r-msg" class="msg" style="color:#ff4444"></p>
            <button style="background:none; border:none; color:#888; font-size:10px; cursor:pointer; margin-top:15px;" onclick="switchAuth('t-auth')">Back to Login</button>
        </div>

        <div id="t-otp" class="container">
            <h1 id="otp-title">Verify Code</h1>
            <p class="desc-text">Enter the 6-digit code sent to your email.</p>
            <input type="text" id="otp-code" placeholder="000000" style="text-align:center; letter-spacing:5px; font-size: 20px;">
            <button class="action-btn" onclick="verify()">Confirm</button>
        </div>

        <div id="t-user" class="container">
            <h1>Profile</h1>
            <div class="info-row"><span class="label">User</span><span id="u-name" class="val">-</span></div>
            <div class="info-row"><span class="label">Rank</span><span id="u-role" class="val" style="color:#fc0">USER</span></div>
            <button class="action-btn" style="background:#333; margin-top: 20px;" onclick="logout()">Logout</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/ILikeSaturday/Helpers@main/Wander.js"></script>
</body>
</html>
